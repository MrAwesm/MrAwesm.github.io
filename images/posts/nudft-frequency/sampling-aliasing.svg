<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAF8F5"/>
      <stop offset="100%" style="stop-color:#F0EDE8"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- 标题 -->
  <text x="400" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#2D3748" font-weight="bold">Sampling and Aliasing Phenomenon</text>

  <!-- 上方区域：正常采样 -->
  <rect x="30" y="45" width="370" height="150" fill="#FFFFFF" stroke="#7CB9A8" rx="8"/>
  <text x="205" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7CB9A8">Fan: 1 rotation/s, Sampling: 4 frames/s</text>

  <!-- 时间轴 -->
  <line x1="50" y1="170" x2="380" y2="170" stroke="#E8E4DE" stroke-width="1"/>

  <!-- 扇叶位置示意（能看到旋转） -->
  <circle cx="80" cy="120" r="20" fill="none" stroke="#7CB9A8" stroke-width="2"/>
  <line x1="80" y1="120" x2="80" y2="100" stroke="#7CB9A8" stroke-width="2"/> <!-- 扇叶指向 -->

  <circle cx="140" cy="120" r="20" fill="none" stroke="#7CB9A8" stroke-width="2"/>
  <line x1="140" y1="120" x2="160" y2="100" stroke="#7CB9A8" stroke-width="2"/> <!-- 扇叶转90度 -->

  <circle cx="200" cy="120" r="20" fill="none" stroke="#7CB9A8" stroke-width="2"/>
  <line x1="200" y1="120" x2="200" y2="140" stroke="#7CB9A8" stroke-width="2"/> <!-- 扇叶转180度 -->

  <circle cx="260" cy="120" r="20" fill="none" stroke="#7CB9A8" stroke-width="2"/>
  <line x1="260" y1="120" x2="240" y2="100" stroke="#7CB9A8" stroke-width="2"/> <!-- 扇叶转270度 -->

  <circle cx="320" cy="120" r="20" fill="none" stroke="#7CB9A8" stroke-width="2"/>
  <line x1="320" y1="120" x2="320" y2="100" stroke="#7CB9A8" stroke-width="2"/> <!-- 扇叶转360度 -->

  <!-- 采样点标记 -->
  <circle cx="80" cy="170" r="3" fill="#7CB9A8"/>
  <circle cx="140" cy="170" r="3" fill="#7CB9A8"/>
  <circle cx="200" cy="170" r="3" fill="#7CB9A8"/>
  <circle cx="260" cy="170" r="3" fill="#7CB9A8"/>
  <circle cx="320" cy="170" r="3" fill="#7CB9A8"/>

  <text x="205" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7CB9A8">✓ Can see rotation!</text>

  <!-- 下方区域：混叠 -->
  <rect x="400" y="45" width="370" height="150" fill="#FFFFFF" stroke="#E8A45C" rx="8"/>
  <text x="575" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#E8A45C">Fan: 4 rotations/s, Sampling: 4 frames/s</text>

  <!-- 时间轴 -->
  <line x1="420" y1="170" x2="770" y2="170" stroke="#E8E4DE" stroke-width="1"/>

  <!-- 扇叶位置示意（看起来静止） -->
  <circle cx="450" cy="120" r="20" fill="none" stroke="#E8A45C" stroke-width="2"/>
  <line x1="450" y1="120" x2="450" y2="100" stroke="#E8A45C" stroke-width="2"/>

  <circle cx="510" cy="120" r="20" fill="none" stroke="#E8A45C" stroke-width="2"/>
  <line x1="510" y1="120" x2="510" y2="100" stroke="#E8A45C" stroke-width="2"/> <!-- 同一位置 -->

  <circle cx="570" cy="120" r="20" fill="none" stroke="#E8A45C" stroke-width="2"/>
  <line x1="570" y1="120" x2="570" y2="100" stroke="#E8A45C" stroke-width="2"/> <!-- 同一位置 -->

  <circle cx="630" cy="120" r="20" fill="none" stroke="#E8A45C" stroke-width="2"/>
  <line x1="630" y1="120" x2="630" y2="100" stroke="#E8A45C" stroke-width="2"/> <!-- 同一位置 -->

  <circle cx="690" cy="120" r="20" fill="none" stroke="#E8A45C" stroke-width="2"/>
  <line x1="690" y1="120" x2="690" y2="100" stroke="#E8A45C" stroke-width="2"/> <!-- 同一位置 -->

  <!-- 采样点标记 -->
  <circle cx="450" cy="170" r="3" fill="#E8A45C"/>
  <circle cx="510" cy="170" r="3" fill="#E8A45C"/>
  <circle cx="570" cy="170" r="3" fill="#E8A45C"/>
  <circle cx="630" cy="170" r="3" fill="#E8A45C"/>
  <circle cx="690" cy="170" r="3" fill="#E8A45C"/>

  <text x="575" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#E8A45C">✗ Looks stationary! (Aliasing)</text>

  <!-- Nyquist定理框 -->
  <rect x="100" y="220" width="600" height="80" fill="#FEF6E8" stroke="#E8A45C" rx="8"/>
  <text x="400" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#2D3748" font-weight="bold">Nyquist-Shannon Sampling Theorem</text>
  <text x="400" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4A5568">Sampling rate Fs = 1/Δt can resolve frequencies up to Fs/2</text>
  <text x="400" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#E8A45C">Maximum detectable frequency = 1/(2Δt)</text>

  <!-- 底部说明 -->
  <text x="400" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4A5568">
    Figure 4: High-frequency signal appears as low-frequency (aliasing) when undersampled
  </text>
  <text x="400" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#718096">
    Like car wheels appearing to rotate backwards in videos
  </text>
</svg>