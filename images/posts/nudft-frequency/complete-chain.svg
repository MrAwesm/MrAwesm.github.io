<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAF8F5"/>
      <stop offset="100%" style="stop-color:#F0EDE8"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#7CB9A8"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="600" height="500" fill="url(#bg)"/>

  <!-- 标题 -->
  <text x="300" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#2D3748" font-weight="bold">Complete Reasoning Chain</text>

  <!-- 步骤1 -->
  <rect x="100" y="40" width="400" height="40" fill="#E8F5F0" stroke="#7CB9A8" rx="6"/>
  <text x="300" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2D3748">Continuous Fourier Transform</text>
  <text x="450" y="55" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#7CB9A8">∫g(t)·e^{-j2πft}dt</text>
  <text x="120" y="55" font-family="Arial, sans-serif" font-size="9" fill="#7CB9A8">"Run opposite to see"</text>

  <!-- 箭头 -->
  <line x1="300" y1="85" x2="300" y2="95" stroke="#7CB9A8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="320" y="92" font-family="Arial, sans-serif" font-size="8" fill="#718096">Time discretization (uniform Δt)</text>

  <!-- 步骤2 -->
  <rect x="100" y="100" width="400" height="40" fill="#E8F5F0" stroke="#7CB9A8" rx="6"/>
  <text x="300" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2D3748">Standard DFT</text>
  <text x="450" y="115" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#7CB9A8">Σ g_n·e^{-j2πmn/N}</text>
  <text x="120" y="115" font-family="Arial, sans-serif" font-size="9" fill="#7CB9A8">Δt cancels out</text>

  <!-- 箭头 -->
  <line x1="300" y1="145" x2="300" y2="155" stroke="#E8A45C" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="320" y="152" font-family="Arial, sans-serif" font-size="8" fill="#E8A45C">Time non-uniform (t_n varies)</text>

  <!-- 步骤3 -->
  <rect x="100" y="160" width="400" height="40" fill="#FEF6E8" stroke="#E8A45C" rx="6"/>
  <text x="300" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2D3748">NUDFT</text>
  <text x="450" y="175" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#E8A45C">Σ g_n·e^{-j2πf_m·t_n}</text>
  <text x="120" y="175" font-family="Arial, sans-serif" font-size="9" fill="#E8A45C">Physical time restored</text>

  <!-- 箭头 -->
  <line x1="300" y1="205" x2="300" y2="215" stroke="#E8A45C" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="320" y="212" font-family="Arial, sans-serif" font-size="8" fill="#718096">Construct weight matrix</text>

  <!-- 步骤4 -->
  <rect x="100" y="220" width="400" height="40" fill="#FEF6E8" stroke="#E8A45C" rx="6"/>
  <text x="300" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2D3748">Frequency Domain Weight Matrix</text>
  <text x="450" y="235" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#E8A45C">W = K_nu^H·diag(F²)·K_nu</text>
  <text x="120" y="235" font-family="Arial, sans-serif" font-size="9" fill="#E8A45C">"Frequency filter"</text>

  <!-- 箭头 -->
  <line x1="300" y1="265" x2="300" y2="275" stroke="#7CB9A8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="320" y="272" font-family="Arial, sans-serif" font-size="8" fill="#718096">Acceleration → Decision variable mapping</text>

  <!-- 步骤5 -->
  <rect x="100" y="280" width="400" height="40" fill="#E8F5F0" stroke="#7CB9A8" rx="6"/>
  <text x="300" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2D3748">Quadratic Cost Function</text>
  <text x="450" y="295" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#7CB9A8">Z^T·ΔH·Z + Δf^T·Z</text>
  <text x="120" y="295" font-family="Arial, sans-serif" font-size="9" fill="#7CB9A8">Add to optimizer</text>

  <!-- 箭头 -->
  <line x1="300" y1="325" x2="300" y2="335" stroke="#7CB9A8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="320" y="332" font-family="Arial, sans-serif" font-size="8" fill="#718096">Low-rank decomposition (modal analysis)</text>

  <!-- 步骤6 -->
  <rect x="100" y="340" width="400" height="40" fill="#E8F5F0" stroke="#7CB9A8" rx="6"/>
  <text x="300" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2D3748">Acceleration</text>
  <text x="450" y="355" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#7CB9A8">N×N → N×r (r≈8)</text>
  <text x="120" y="355" font-family="Arial, sans-serif" font-size="9" fill="#7CB9A8">~10x faster</text>

  <!-- 最终结果框 -->
  <rect x="100" y="400" width="400" height="50" fill="#FFFFFF" stroke="#D4CFC6" stroke-width="2" rx="8"/>
  <text x="300" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2D3748" font-weight="bold">Result: Real-time Frequency-Constrained Motion Control</text>
  <text x="300" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7CB9A8">✓ No structural change to optimizer</text>

  <!-- 底部说明 -->
  <text x="300" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4A5568">
    Figure 7: From Fourier transform to real-time control — complete reasoning chain
  </text>
</svg>