<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="800" height="250">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAF8F5"/>
      <stop offset="100%" style="stop-color:#F0EDE8"/>
    </linearGradient>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#7CB9A8"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#E8A45C"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="250" fill="url(#bg)"/>

  <!-- 标题 -->
  <text x="400" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#2D3748" font-weight="bold">Frequency Domain Cost Construction: Three-Step Translation</text>

  <!-- 流程区域 -->
  <rect x="30" y="40" width="740" height="120" fill="#FFFFFF" stroke="#E8E4DE" rx="8"/>

  <!-- 步骤1: 时域信号 -->
  <rect x="50" y="70" width="120" height="60" fill="#E8F5F0" stroke="#7CB9A8" rx="6"/>
  <text x="110" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2D3748">Time Domain</text>
  <text x="110" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7CB9A8">Signal θ̈</text>

  <!-- 箭头1 -->
  <path d="M175 100 L205 100" stroke="#7CB9A8" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="190" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7CB9A8">K_nu</text>

  <!-- 步骤2: 频域 -->
  <rect x="210" y="70" width="120" height="60" fill="#FEF6E8" stroke="#E8A45C" rx="6"/>
  <text x="270" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2D3748">Frequency Domain</text>
  <text x="270" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#E8A45C">NUDFT output</text>

  <!-- 箭头2 -->
  <path d="M335 100 L365 100" stroke="#E8A45C" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="350" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#E8A45C">diag(|F|²)</text>

  <!-- 步骤3: 加权 -->
  <rect x="370" y="70" width="120" height="60" fill="#FEF6E8" stroke="#E8A45C" rx="6"/>
  <text x="430" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2D3748">Weighted</text>
  <text x="430" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#E8A45C">Penalty applied</text>

  <!-- 箭头3 -->
  <path d="M495 100 L525 100" stroke="#7CB9A8" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="510" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7CB9A8">K_nu^H</text>

  <!-- 步骤4: 回时域 -->
  <rect x="530" y="70" width="120" height="60" fill="#E8F5F0" stroke="#7CB9A8" rx="6"/>
  <text x="590" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2D3748">Time Domain</text>
  <text x="590" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7CB9A8">Weight matrix W</text>

  <!-- 最终结果 -->
  <rect x="660" y="70" width="100" height="60" fill="#FFFFFF" stroke="#D4CFC6" rx="6"/>
  <text x="710" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2D3748">Result:</text>
  <text x="710" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#4A5568">θ̈^T · W · θ̈</text>

  <!-- 箭头到结果 -->
  <path d="M655 100 L660 100" stroke="#D4CFC6" stroke-width="1.5"/>

  <!-- 底部注释 -->
  <rect x="100" y="175" width="600" height="50" fill="#FFFFFF" stroke="#E8E4DE" rx="6"/>
  <text x="400" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2D3748">Key Formula:</text>
  <text x="400" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#E8A45C">W = real(K_nu^H · diag(|F|²) · K_nu)</text>

  <!-- 底部说明 -->
  <text x="400" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4A5568">
    Figure 6: Frequency cost construction — translate to frequency domain, apply penalty, translate back
  </text>
</svg>