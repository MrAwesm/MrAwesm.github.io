---
layout: default
---

<div class="posts">
  {% for post in site.posts %}
    <article class="post">
      <h2 class="post-title">
        <a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a>
      </h2>
      
      <div class="post-meta">
        <span class="date">{{ post.date | date: "%B %e, %Y" }}</span>
        {% include reading-time.html content=post.content %}
      </div>
      
      <div class="post-excerpt">
        {{ post.excerpt }}
      </div>
      
      <a href="{{ site.baseurl }}{{ post.url }}" class="read-more">Continue Reading</a>
    </article>
  {% endfor %}
</div>

{% if site.posts.size == 0 %}
<div class="post-content">
  <p style="text-align: center; color: #718096;">No posts yet. Stay tuned for updates!</p>
</div>
{% endif %}
