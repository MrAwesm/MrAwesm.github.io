<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" width="700" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAF8F5"/>
      <stop offset="100%" style="stop-color:#F0EDE8"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#4A5568"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="700" height="400" fill="url(#bg)"/>

  <!-- 标题 -->
  <text x="350" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#2D3748" font-weight="bold">Fourier Transform Intuition: "Run Opposite to See Clearly"</text>

  <!-- 场景背景 -->
  <rect x="50" y="60" width="600" height="280" fill="#FFFFFF" stroke="#E8E4DE" rx="8"/>

  <!-- 道路 -->
  <rect x="50" y="200" width="600" height="40" fill="#F5F2ED"/>
  <line x1="50" y1="220" x2="650" y2="220" stroke="#D4CFC6" stroke-width="2" stroke-dasharray="20,10"/>

  <!-- 方向指示 -->
  <text x="100" y="180" font-family="Arial, sans-serif" font-size="12" fill="#718096">← Direction of travel</text>

  <!-- 骑行者们（不同速度） -->
  <!-- 观察者（以目标速度反向跑） -->
  <circle cx="350" cy="210" r="15" fill="#7CB9A8"/>
  <text x="350" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7CB9A8" font-weight="bold">Observer</text>
  <text x="350" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7CB9A8">v = -10 km/h</text>
  <!-- 反向箭头 -->
  <path d="M350 210 L320 210" stroke="#7CB9A8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 目标骑行者（正好10km/h） -->
  <circle cx="350" cy="260" r="12" fill="#E8A45C"/>
  <text x="350" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#E8A45C">Target: 10 km/h</text>
  <text x="350" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#E8A45C">→ Relative: 0 km/h (STOPPED!) ✓</text>
  <!-- 双箭头表示相对静止 -->
  <circle cx="350" cy="260" r="18" fill="none" stroke="#E8A45C" stroke-width="2" stroke-dasharray="4,2"/>

  <!-- 其他骑行者 -->
  <circle cx="200" cy="210" r="10" fill="#718096"/>
  <text x="200" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#718096">5 km/h</text>
  <path d="M200 210 L240 210" stroke="#718096" stroke-width="1.5" marker-end="url(#arrow)"/>

  <circle cx="500" cy="210" r="10" fill="#718096"/>
  <text x="500" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#718096">15 km/h</text>
  <path d="M500 210 L540 210" stroke="#718096" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 解释框 -->
  <rect x="80" y="70" width="200" height="60" fill="#E8F5F0" stroke="#7CB9A8" rx="6"/>
  <text x="180" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2D3748">Key Insight:</text>
  <text x="180" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7CB9A8">Match target frequency</text>
  <text x="180" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7CB9A8">but OPPOSITE direction!</text>

  <!-- 数学公式框 -->
  <rect x="420" y="70" width="220" height="60" fill="#FEF6E8" stroke="#E8A45C" rx="6"/>
  <text x="530" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2D3748">Mathematical verification:</text>
  <text x="530" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#E8A45C">Signal: e^{+j2πf₀t}</text>
  <text x="530" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#E8A45C">Detector: e^{-j2πf₀t} ← minus sign!</text>

  <!-- 底部说明 -->
  <text x="350" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4A5568">
    Figure 3: The negative sign in Fourier transform makes target frequency "stop rotating"
  </text>
  <text x="350" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#718096">
    e^{+j2πf₀t} × e^{-j2πf₀t} = e^{j·0} = 1 (constant, detectable!)
  </text>
</svg>