---
layout: default
---

<article class="post-content">
  <h1>{{ page.title }}</h1>
  
  <div class="post-meta">
    <span class="date">Written on {{ page.date | date: "%B %e, %Y" }}</span>
    {% include reading-time.html content=page.content %}
  </div>
  
  <div class="entry">
    {{ content }}
  </div>
  
  {% include disqus.html %}
</article>
